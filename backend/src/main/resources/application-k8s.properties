spring.application.name=acitypay-backend

server.port=8080

spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:acitypay}
spring.datasource.username=${DB_USER:acitypay}
spring.datasource.password=${DB_PASSWORD:acitypay_dev}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
